gates:
  - type: multiple_choice
    questions: 1
    pass_threshold: 1

# Exercise the owner/member path in e2e: owners, members, and collaborators are
# not exempt in this fixture.
trust:
  default_author_associations: []

# Keep owner smoke tests short. The owner PR should become ready for the
# challenge immediately instead of waiting for maintainer approval.
require_approval: never

# Make tiny fixture PRs eligible for a challenge.
min_changed_lines: 0
skip_paths: []

output:
  comments: detailed
  labels: true
