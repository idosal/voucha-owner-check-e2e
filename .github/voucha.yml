gates:
  - type: multiple_choice
    questions: 1
    pass_threshold: 1

# Exercise the owner/member path in the public demo: owners, members, and
# collaborators are not exempt in this repository.
trust:
  default_author_associations: []

# Keep the demo short. An owner-authored PR becomes ready for the challenge
# immediately instead of waiting for maintainer approval.
require_approval: never

# Make the deliberately small demo PR eligible for a challenge.
min_changed_lines: 0
skip_paths: []

output:
  comments: detailed
  labels:
    # Enable every outcome label so the public demo exposes the full contract.
    passed: true # VOUCHA:passed
    failed: true # VOUCHA:failed
    flagged: true # VOUCHA:flagged
  contributor_message: >
    Thanks for contributing to the VOUCHA demo, {{author}}. Please complete
    this one-question comprehension check when you're ready.
